[global]
   workgroup = LABO
   server string = Labo Ecole - Serveur de fichiers
   security = user
   map to guest = never
   # On reste sur SMB2+ (SMB1 est desactive par defaut cote clients modernes).
   server min protocol = SMB2
   server max protocol = SMB3
   # Log vers stdout pour `docker compose logs smb`.
   log level = 1
   smb ports = 445

# ---------------------------------------------------------------------------
# Partage "public" : SMB SANS chiffrement.
# Le contenu des fichiers transite EN CLAIR -> lisible dans Wireshark
# (SMB2 Read Response). C'est l'equivalent de HTTP.
# ---------------------------------------------------------------------------
[public]
   path = /shares/public
   comment = Partage non chiffre (demo Wireshark)
   read only = yes
   valid users = apprenti
   smb encrypt = off

# ---------------------------------------------------------------------------
# Partage "coffre" : SMB3 avec chiffrement OBLIGATOIRE.
# Meme fichier, mais Wireshark n'affiche que "Encrypted SMB3" -> illisible.
# C'est l'equivalent de HTTPS.
# ---------------------------------------------------------------------------
[coffre]
   path = /shares/coffre
   comment = Partage chiffre SMB3 (demo Wireshark)
   read only = yes
   valid users = apprenti
   smb encrypt = required
